{% extends "base.html" %}
{% block content %}
  <h1>Register</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>Username
      <input type="text" name="username" required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button type="submit">Create account</button>
  </form>
{% endblock %}
